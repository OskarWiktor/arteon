name: Security Audit

# Scans dependencies for known vulnerabilities.
# Fails the run on HIGH or CRITICAL advisories so they block a merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly catch-all (Mondays 06:00 UTC) for advisories published
    # after a dependency was already merged.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Audits only production dependencies (--omit=dev): this is a static site,
      # so dev-only tooling (eslint plugins, build tools) never ships to users.
      # Reads package-lock.json directly — no install or build needed.
      - name: Run npm audit (fail on high/critical, production deps only)
        run: npm audit --audit-level=high --omit=dev
